<!DOCTYPE html>
<html>
<head>
    <!-- Firebase Apps & Services -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCcy-LscSkLtF0A9cZfAw3RkhuMvwdR9z0",
        authDomain: "blogger-push-2600c.firebaseapp.com",
        projectId: "blogger-push-2600c",
        storageBucket: "blogger-push-2600c.firebasestorage.app",
        messagingSenderId: "123215748336",
        appId: "1:123215748336:web:b514311091defcdbfff635",
        measurementId: "G-F7S0MMWCF3"
    };

    // Firebase Initialize කිරීම
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();
    const db = firebase.firestore();

    async function initPush() {
        if (Notification.permission === 'granted') {
            try {
                // 1. Service Worker එක Register කිරීම
                await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                
                // 🟢 2. Service Worker එක ACTIVE වන තෙක් රැඳී සිටීම (AbortError විසඳුම)
                const registration = await navigator.serviceWorker.ready;
                console.log("Service Worker Active Status: Ready!");

                // 3. FCM Token එක ලබා ගැනීම
                const currentToken = await messaging.getToken({ 
                    serviceWorkerRegistration: registration,
                    vapidKey: "BLdoMX40XO497PVtd7M2uv7Mii895Nl-QIynXiJWR3lf1GScoqOjY4neYyUBGhU9X9-WDLMCrCCICJr6ozVZWr0"
                });

                if (currentToken) {
                    console.log("Token Received: ", currentToken);
                    
                    // 4. Firestore එකට Save කිරීම
                    await db.collection("fcm_tokens").doc(currentToken).set({
                        token: currentToken,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    console.log("🎉 Token successfully saved to Firestore!");
                    window.parent.postMessage({ type: "FCM_TOKEN", token: currentToken }, "*");
                }
            } catch (err) {
                console.error('Push Error:', err);
            }
        } else {
            console.warn("Notification permission not granted yet.");
        }
    }

    // Load වූ පසු ක්‍රියාත්මක කිරීම
    window.addEventListener("load", initPush);
    window.addEventListener("message", (event) => {
        if (event.data === "request-token") {
            initPush();
        }
    });
</script>
</body>
</html>
