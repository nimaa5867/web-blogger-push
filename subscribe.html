<!DOCTYPE html>
<html>
<head>
    <title>Subscribe to Notifications</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f9f9f9;
        }
        .btn {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <h2>🔔 Get Latest Updates!</h2>
    <p>Click below to allow push notifications for AshNimiq.</p>
    <button class="btn" onclick="requestPushPermission()">Allow Notifications</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcy-LscSkLtF0A9cZfAw3RkhuMvwdR9z0",
            authDomain: "blogger-push-2600c.firebaseapp.com",
            projectId: "blogger-push-2600c",
            storageBucket: "blogger-push-2600c.firebasestorage.app",
            messagingSenderId: "123215748336",
            appId: "1:123215748336:web:b514311091defcdbfff635",
            measurementId: "G-F7S0MMWCF3"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();
        const db = firebase.firestore();

        async function requestPushPermission() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                    await navigator.serviceWorker.ready;

                    const currentToken = await messaging.getToken({ 
                        serviceWorkerRegistration: registration,
                        vapidKey: "BLdoMX40XO497PVtd7M2uv7Mii895Nl-QIynXiJWR3lf1GScoqOjY4neYyUBGhU9X9-WDLMCrCCICJr6ozVZWr0"
                    });

                    if (currentToken) {
                        // Firestore එකට Save කිරීම
                        await db.collection("fcm_tokens").doc(currentToken).set({
                            token: currentToken,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        alert("🎉 Subscribed successfully!");
                        if (window.opener) {
                            window.opener.postMessage("FCM_SAVED_SUCCESS", "https://blog.ashnimiq.com");
                        }
                        window.close(); // Save වූ පසු Popup එක Auto-Close වේ
                    }
                }
            } catch (err) {
                console.error("Popup FCM Error:", err);
                alert("Error enabling notifications. Please try again.");
            }
        }

        // Auto prompt on load inside popup
        window.onload = () => {
            if (Notification.permission === 'default') {
                requestPushPermission();
            }
        };
    </script>
</body>
</html>
