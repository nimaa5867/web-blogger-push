<!DOCTYPE html>
<html>
<head>
    <!-- Firebase Apps & Services -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCcy-LscSkLtF0A9cZfAw3RkhuMvwdR9z0",
        authDomain: "blogger-push-2600c.firebaseapp.com",
        projectId: "blogger-push-2600c",
        storageBucket: "blogger-push-2600c.firebasestorage.app",
        messagingSenderId: "123215748336",
        appId: "1:123215748336:web:b514311091defcdbfff635",
        measurementId: "G-F7S0MMWCF3"
    };

    // Firebase Initialize කිරීම
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();
    const db = firebase.firestore();

    // Auto-execution function
    function initPush() {
        if (Notification.permission === 'granted') {
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
            .then((registration) => {
                console.log("Service Worker Registered Successfully!");
                return messaging.getToken({ 
                    serviceWorkerRegistration: registration,
                    vapidKey: "BLdoMX40XO497PVtd7M2uv7Mii895Nl-QIynXiJWR3lf1GScoqOjY4neYyUBGhU9X9-WDLMCrCCICJr6ozVZWr0"
                });
            })
            .then((currentToken) => {
                if (currentToken) {
                    console.log("Token Received: ", currentToken);
                    // Firestore එකට Save කිරීම
                    return db.collection("fcm_tokens").doc(currentToken).set({
                        token: currentToken,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            })
            .then(() => {
                console.log("🎉 Token successfully saved to Firestore!");
            })
            .catch((err) => console.error('Push Error:', err));
        } else {
            console.warn("Notification permission not granted yet.");
        }
    }

    // Page එක load වූ සැනින් හෝ message එකක් ආ විට run කරන්න
    window.addEventListener("load", initPush);
    window.addEventListener("message", (event) => {
        if (event.data === "request-token") {
            initPush();
        }
    });
</script>
</body>
</html>
