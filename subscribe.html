<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCcy-LscSkLtF0A9cZfAw3RkhuMvwdR9z0",
        authDomain: "blogger-push-2600c.firebaseapp.com",
        projectId: "blogger-push-2600c",
        storageBucket: "blogger-push-2600c.firebasestorage.app",
        messagingSenderId: "123215748336",
        appId: "1:123215748336:web:b514311091defcdbfff635",
        measurementId: "G-F7S0MMWCF3"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();
    const db = firebase.firestore();

    async function initPush() {
        try {
            await navigator.serviceWorker.register('/firebase-messaging-sw.js');
            const registration = await navigator.serviceWorker.ready;
            
            const currentToken = await messaging.getToken({ 
                serviceWorkerRegistration: registration,
                vapidKey: "BLdoMX40XO497PVtd7M2uv7Mii895Nl-QIynXiJWR3lf1GScoqOjY4neYyUBGhU9X9-WDLMCrCCICJr6ozVZWr0"
            });

            if (currentToken) {
                await db.collection("fcm_tokens").doc(currentToken).set({
                    token: currentToken,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                window.parent.postMessage({ type: "FCM_TOKEN", token: currentToken }, "*");
            }
        } catch (err) {
            console.error('Push Error:', err);
        }
    }

    window.addEventListener("message", (event) => {
        if (event.origin !== "https://blog.ashnimiq.com") return;
        if (event.data === "request-token") {
            initPush();
        }
    });
</script>
</body>
</html>
