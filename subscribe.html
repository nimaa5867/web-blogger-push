<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCcy-LscSkLtF0A9cZfAw3RkhuMvwdR9z0",
        authDomain: "blogger-push-2600c.firebaseapp.com",
        projectId: "blogger-push-2600c",
        storageBucket: "blogger-push-2600c.firebasestorage.app",
        messagingSenderId: "123215748336",
        appId: "1:123215748336:web:b514311091defcdbfff635",
        measurementId: "G-F7S0MMWCF3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Main Domain එකෙන් SAVE_TOKEN Message එක ලැබුණු විට Firestore එකට Save කිරීම
    window.addEventListener("message", async (event) => {
        if (event.origin !== "https://blog.ashnimiq.com") return;

        if (event.data && event.data.type === "SAVE_TOKEN") {
            const token = event.data.token;
            try {
                await db.collection("fcm_tokens").doc(token).set({
                    token: token,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                console.log("🎉 Token successfully saved to Firestore via Subdomain Bridge!");
            } catch (error) {
                console.error("Error saving token to Firestore:", error);
            }
        }
    });
</script>
</body>
</html>
